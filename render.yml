services:
  - type: web
    name: rolplaypro-dashboard
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── PHP Bridge (Mode B — no port 3306 required) ──────────────────────
      - key: BRIDGE_URL
        value: https://improveyourpitchbeta.net/rolplay-ai/rolplay-bridge.php
      - key: BRIDGE_SECRET
        sync: false   # set this secret in Render dashboard → Environment
