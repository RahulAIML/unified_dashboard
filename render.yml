services:
  - type: web
    name: rolplaypro-dashboard
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Analytics DB (rolplay_pro_analytics) ──────────────────────────────
      # Set these as secret environment variables in the Render dashboard.
      # Do NOT hardcode credentials here.
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
