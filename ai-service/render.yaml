# Render blueprint for the AI dashboard-builder service.
# Deploy: point Render at this repo, rootDir = ai-service. Then set AI_SERVICE_URL
# on the Next.js service to this service's URL so /api/ai/* proxies to it.
services:
  - type: web
    name: rolplay-ai-dashboard-builder
    runtime: python
    rootDir: ai-service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-3-flash-preview
      - key: AUTH_DATABASE_URL
        sync: false
      - key: PHARMA_BRIDGE_BASE_URL
        value: https://serv.aux-rolplay.com/unified
      - key: PHARMA_HOST_ROOT
        value: https://serv.aux-rolplay.com
      - key: ROLPLAY_APP_SQL_URL
        value: https://rolplay.app/ajax/remote-access.php
      - key: BRIDGE_URL
        sync: false
      - key: BRIDGE_SECRET
        sync: false
      - key: SECOND_BRAIN_API_URL
        sync: false
      - key: SECOND_BRAIN_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://rolplaypro-dashboard.onrender.com
